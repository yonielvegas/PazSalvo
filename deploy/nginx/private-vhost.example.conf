server {
    listen 80;
    server_name DOMINIO_PRIVADO_AIG;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name DOMINIO_PRIVADO_AIG;
    root /var/www/PazSalvo/current/public;
    index index.php;

    # REQUIERE VALIDACIÓN EN SERVIDOR DE PRODUCCIÓN: certificados TLS AIG.
    ssl_certificate /etc/ssl/certs/DOMINIO_PRIVADO_AIG.crt;
    ssl_certificate_key /etc/ssl/private/DOMINIO_PRIVADO_AIG.key;

    # REQUIERE VALIDACIÓN EN SERVIDOR DE PRODUCCIÓN: rangos VPN/red institucional.
    allow CIDR_INSTITUCIONAL_1;
    deny all;

    client_max_body_size 10m;
    autoindex off;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* \.(env|sql|bak|zip|log)$ {
        deny all;
    }

    location ~ /(?:\.git|storage|vendor|node_modules|tests)/ {
        deny all;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_pass unix:/run/php/php-fpm-pazsalvo.sock;
        fastcgi_read_timeout 120s;
        fastcgi_hide_header X-Powered-By;
    }
}
